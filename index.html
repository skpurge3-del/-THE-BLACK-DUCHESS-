<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>༺𓂀 THE BLACK DUCHESS 黑暗 🛡️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');
    
    :root {
      --bape-pink: #e84a7f;
      --bape-pink-glow: #ff69b4;
      --bape-dark: #0b0b0b;
      --bape-card: #111111;
      --bape-border: #2a2a2a;
      --bape-text: #f0c0d0;
      --bape-muted: #9e7a8a;
      --bape-camo: #1c1c1c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #050505;
      font-family: 'Inter', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      position: relative;
      background-image: radial-gradient(circle at 30% 40%, rgba(232, 74, 127, 0.12) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 105, 180, 0.08) 0%, transparent 50%);
    }

    /* Image en fond full screen */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('vivi.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      opacity: 0.25;
      filter: grayscale(40%) brightness(0.7) contrast(1.1);
      pointer-events: none;
    }

    /* Écran de verrouillage */
    #lock-screen {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      background-image: radial-gradient(circle at center, rgba(232, 74, 127, 0.2) 0%, transparent 80%);
    }

    .lock-box {
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(16px);
      padding: 32px 24px;
      border-radius: 32px;
      border: 1.5px solid var(--bape-border);
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px rgba(232,74,127,0.25);
      max-width: 380px;
      width: 90%;
      position: relative;
      z-index: 10;
    }

    .lock-box h2 {
      color: #f5a3c7;
      font-family: 'UnifrakturMaguntia', 'Courier New', cursive;
      letter-spacing: 2px;
      font-size: 1.8rem;
      text-shadow: 0 0 12px #e84a7f, 0 0 25px #c0406e, 0 0 35px #ff69b4;
      margin-bottom: 20px;
      word-break: keep-all;
      line-height: 1.3;
    }

    .lock-photo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin: 10px auto;
      border: 2px solid #e84a7f;
      box-shadow: 0 0 25px rgba(232,74,127,0.7);
      display: block;
      background: #1a1a1a;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px;
      margin: 18px 0 12px;
      background: #0d0d0d;
      border: 1.5px solid #3a2a33;
      color: #f8b0cc;
      border-radius: 40px;
      text-align: center;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      outline: none;
      background: #111;
      transition: all 0.25s;
    }

    input[type="password"]:focus {
      border-color: #e84a7f;
      box-shadow: 0 0 18px #e84a7f66;
    }

    input::placeholder {
      color: #6e5562;
      letter-spacing: 1.5px;
    }

    .btn-gen {
      width: 100%;
      padding: 12px 20px;
      background: transparent;
      border: 1.5px solid #e84a7f;
      color: #f5a3c7;
      border-radius: 40px;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      transition: 0.3s;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      background: rgba(232,74,127,0.05);
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .btn-gen:hover {
      background: #e84a7f;
      color: #0a0a0a;
      box-shadow: 0 0 30px #e84a7f;
      border-color: #ff99c2;
      font-weight: bold;
    }

    /* Interface principale */
    #main-content {
      display: none;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 10;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
      padding: 20px 12px 14px;
      background: rgba(12, 12, 12, 0.8);
      backdrop-filter: blur(14px);
      border: 1px solid #2e2e2e;
      border-radius: 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 18px rgba(232,74,127,0.3);
    }

    .header h1 {
      color: #f5a3c7;
      font-size: 1.7rem;
      margin: 0;
      text-shadow: 0 0 15px #e84a7f, 2px 2px 0 #000, 0 0 30px #ff69b4;
      letter-spacing: 2px;
      font-family: 'UnifrakturMaguntia', 'Courier New', cursive;
      word-break: keep-all;
      line-height: 1.3;
    }

    .subtitle {
      color: #c78da0;
      font-size: 0.7rem;
      letter-spacing: 2px;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .header-photo {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      object-fit: cover;
      margin: 12px auto 4px;
      border: 2px solid #e84a7f;
      box-shadow: 0 0 18px #e84a7f;
      display: block;
      background: #1e1e1e;
    }

    .display-area {
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(14px);
      border: 1px solid #3a2e35;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 15px rgba(232,74,127,0.2);
    }

    .display-area p {
      color: #c78da0;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: transparent;
      border: none;
      color: #ffb6d1;
      font-size: 0.8rem;
      resize: none;
      outline: none;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 5px #e84a7f;
    }

    .support-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ban-card {
      background: rgba(14, 14, 14, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid #342b30;
      border-radius: 24px;
      padding: 14px 14px 12px;
      text-align: center;
      transition: 0.25s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.6);
    }

    .ban-card:hover {
      border-color: #e84a7f;
      box-shadow: 0 0 22px #e84a7f55, inset 0 0 12px rgba(232,74,127,0.2);
      transform: translateY(-2px);
    }

    .ban-card h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      letter-spacing: 2px;
      color: #f5a3c7;
      text-shadow: 0 0 8px #c0406e;
    }

    .btn-gen.red-btn {
      border-color: #ff85b3;
      color: #ffb3cc;
    }

    .send-group {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    .btn-final {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.3s;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      background: rgba(20, 20, 20, 0.7);
      border: 1.5px solid #e84a7f;
      color: #f5a3c7;
    }

    .btn-wa {
      background: rgba(232,74,127,0.15);
      box-shadow: 0 0 12px rgba(232,74,127,0.4);
    }

    .btn-gm {
      background: rgba(20, 20, 20, 0.8);
      border-color: #c0406e;
      color: #f5c0d8;
    }

    .btn-final:hover {
      background: #e84a7f;
      color: #0a0a0a;
      border-color: #ffb6d1;
      box-shadow: 0 0 28px #e84a7f;
      font-weight: bold;
    }

    /* scrollbar rose/noir */
    ::-webkit-scrollbar {
      width: 7px;
    }
    ::-webkit-scrollbar-track {
      background: #0b0b0b;
    }
    ::-webkit-scrollbar-thumb {
      background: #e84a7f;
      border-radius: 10px;
    }

    @keyframes softPulse {
      0% { opacity: 0.9; }
      50% { opacity: 0.6; }
      100% { opacity: 0.9; }
    }
    .pulse {
      animation: softPulse 2.2s infinite;
    }
  </style>
</head>
<body>
  <div id="lock-screen">
    <div class="lock-box">
      <h2>༺𓂀 THE BLACK DUCHESS 黑暗</h2>
      <!-- Photo en fond + miniature visible -->
      <img src="vivi.jpg" alt="Vivi" class="lock-photo" id="lock-photo" onerror="this.style.display='none'" />
      <input type="password" id="pass" placeholder="ENTREZ LE NOM DU MAITRE" />
      <button class="btn-gen" onclick="unlock()">⚰ DÉVERROUILLER ⚰</button>
    </div>
  </div>

  <div id="main-content">
    <div class="header">
      <h1>༺𓂀 THE BLACK DUCHESS 黑暗 ⭐</h1>
      <p class="subtitle">☠ SYSTÈME DE SUPPRESSION RADICALE ☠</p>
      <img src="vivi.jpg" alt="Vivi" class="header-photo" id="header-photo" onerror="this.style.display='none'" />
    </div>

    <div class="display-area">
      <p>🩸 TEXTE GÉNÉRÉ :</p>
      <textarea id="output" readonly placeholder="Le texte de suppression apparaîtra ici..."></textarea>
    </div>

    <div class="support-grid">
      <div class="ban-card">
        <h3>⛧ BAN vivi 🚫 (SÉCURITÉ)</h3>
        <button class="btn-gen" onclick="gen(1)">🗡 Générer Ban 1</button>
      </div>
      <div class="ban-card">
        <h3>⛧ BAN Blood ❌ (VIOLENCE)</h3>
        <button class="btn-gen red-btn" onclick="gen(2)">☠ Générer Ban 2</button>
      </div>
      <div class="ban-card">
        <h3>⛧ BAN fucking ⚠️ (HARCÈLEMENT)</h3>
        <button class="btn-gen" onclick="gen(3)">⚔ Générer Ban 3</button>
      </div>
      <div class="ban-card">
        <h3>⛧ BAN Valwulence 💀 (CRITIQUE)</h3>
        <button class="btn-gen red-btn" onclick="gen(4)">🕯 Générer Ban 4</button>
      </div>
    </div>

    <div class="send-group">
      <button class="btn-final btn-wa" onclick="send('wa')">⛧ WHATSAPP</button>
      <button class="btn-final btn-gm" onclick="send('gm')">☠ GMAIL</button>
    </div>
  </div>

  <script>
    const MASTER = "vivi";

    function unlock() {
      if (document.getElementById('pass').value.toLowerCase() === MASTER) {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      } else {
        alert("⛧ ACCÈS REFUSÉ ⛧");
      }
    }

    const reports = {
      1: "🚨 DENUNCIA URGENTE: El número [N] está violando gravemente los términos de seguridad de la plataforma. Solicito suspensión inmediata.",
      2: "⚠️ REPORT DE VIOLENCE CRITIQUE: L'utilisateur [N] propage du contenu interdit et dangereux. Intervention urgente requise pour bannissement.",
      3: "🛑 HARASSMENT ALERT: Account [N] is involved in systematic cyber-bullying. This is a direct violation of community standards. Terminate now.",
      4: "🆘 EMERGENCY SECURITY BREACH: [N] is bypassing safety protocols. This account poses a risk to all users. Permanent ban requested."
    };

    function gen(id) {
      let cible = prompt("🩸 Numéro de la cible :");
      if (cible) {
        document.getElementById('output').value = reports[id].replace("[N]", cible);
      }
    }

    function send(type) {
      const txt = document.getElementById('output').value;
      if (!txt) return alert("⛧ Générez d'abord un texte !");
      if (type === 'wa') {
        window.location.href = "https://wa.me/16505361212?text=" + encodeURIComponent(txt);
      } else {
        window.location.href = `mailto:support@whatsapp.com?subject=URGENT REPORT&body=${encodeURIComponent(txt)}`;
      }
    }
  </script>
</body>
</html>
